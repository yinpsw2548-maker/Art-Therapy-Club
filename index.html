<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Art Therapy Club - ระบบจองคิว</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #F7F5F2;
            --primary-color: #A3B18A;
            --primary-hover: #588157;
            --text-color: #344E41;
            --card-bg: #FFFFFF;
            --danger-color: #e07a5f;
            --warning-color: #f4a261;
            --info-color: #3d5a80;
        }

        body {
            font-family: 'Prompt', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 2rem 0;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            display: none;
            margin: 0 auto;
        }

        .active-page { display: block; animation: fadeIn 0.5s ease; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1, h2, h3 { text-align: center; margin-bottom: 1.5rem; font-weight: 500; }
        .form-group { margin-bottom: 1rem; text-align: left; }
        label { display: block; margin-bottom: 0.5rem; font-size: 0.9rem; }
        input, select {
            width: 100%; padding: 10px; border: 1px solid #ddd;
            border-radius: 8px; box-sizing: border-box;
            font-family: 'Prompt', sans-serif; background-color: #fafafa;
        }
        input:focus, select:focus { outline: none; border-color: var(--primary-color); }
        
        button {
            width: 100%; padding: 12px; background-color: var(--primary-color);
            color: white; border: none; border-radius: 8px; cursor: pointer;
            font-size: 1rem; font-family: 'Prompt', sans-serif; transition: background 0.3s;
            margin-top: 1rem;
        }
        button:hover { background-color: var(--primary-hover); }
        
        .link-btn { background: none; color: var(--primary-hover); text-decoration: underline; padding: 0; margin-top: 1rem; font-size: 0.9rem; width: 100%; text-align: center; border: none; cursor: pointer; }
        .logout-btn { background-color: var(--danger-color); }
        .logout-btn:hover { background-color: #c15c42; }

        /* Admin & User Table Styles */
        .admin-container { max-width: 1000px; }
        .table-responsive { overflow-x: auto; margin-bottom: 2rem; }
        table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; font-size: 0.9rem; }
        th { background-color: var(--bg-color); white-space: nowrap; }
        
        .status-badge {
            padding: 4px 8px; border-radius: 12px; font-size: 0.8rem; font-weight: 500;
        }
        .status-pending { background-color: #ffe8cc; color: #d97706; }
        .status-confirmed { background-color: #d3f9d8; color: #2b8a3e; }
        .status-cancelled { background-color: #ffe3e3; color: #c92a2a; }
        .status-return { background-color: #e2eafc; color: #1a4f8b; }

        .action-btn {
            padding: 6px 10px; margin: 2px; font-size: 0.8rem; width: auto; margin-top: 0;
        }
        .btn-edit { background-color: var(--warning-color); color: #fff; border: none; border-radius: 4px; cursor: pointer;}
        .btn-delete { background-color: var(--danger-color); color: #fff; border: none; border-radius: 4px; cursor: pointer;}
        .btn-edit-user { background-color: var(--info-color); color: #fff; border: none; border-radius: 4px; cursor: pointer;}

        .user-bookings { margin-top: 2rem; border-top: 1px solid #eee; padding-top: 1.5rem; }
        .admin-section-divider { margin: 3rem 0 1rem 0; border-top: 2px dashed #ddd; }

        /* Custom Modal Styles (Popup) แก้ไขให้ตัวเลือกสถานะไม่ล้น */
        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center;
        }
        .modal-content {
            background: var(--card-bg); padding: 2rem; border-radius: 16px; width: 90%; max-width: 400px;
            text-align: center; box-shadow: 0 4px 20px rgba(0,0,0,0.2); animation: fadeIn 0.3s ease;
        }
        .modal-buttons { display: flex; gap: 10px; margin-top: 1.5rem; justify-content: center; }
        .modal-buttons button { margin-top: 0; }
        .modal-btn-cancel { background-color: #e0e0e0; color: #333; }
        .modal-btn-cancel:hover { background-color: #ccc; }
        #modalInput { margin-top: 1rem; display: none; }
        
        /* Success Animation */
        @keyframes popScale {
            0% { transform: scale(0.5); opacity: 0; }
            70% { transform: scale(1.15); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }
        .success-icon {
            font-size: 3.5rem;
            margin-bottom: 0.5rem;
            display: inline-block;
            animation: popScale 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        /* Layout for setting form */
        .setting-flex { display: flex; gap: 10px; align-items: center; justify-content: center; margin-top: 0.5rem; }
        .setting-flex input { width: 100px; margin: 0; }
        .setting-flex button { width: auto; margin: 0; padding: 10px 20px; }
        .name-group { display: flex; gap: 10px; }
        .name-group .form-group { flex: 1; }

        /* Styles for User Booking Cards */
        .booking-card {
            background: #fafafa; border: 1px solid #eaeaea; border-radius: 12px;
            padding: 1.2rem; margin-bottom: 1rem; text-align: left;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02); position: relative;
        }
        .booking-card p { margin: 0.4rem 0; font-size: 0.9rem; }
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.8rem; border-bottom: 1px solid #eee; padding-bottom: 0.5rem; }
        .card-buttons { display: flex; gap: 10px; margin-top: 1rem; }
        .card-buttons button { margin-top: 0; padding: 8px; font-size: 0.85rem; }
        .btn-outline { background: transparent; border: 1px solid var(--primary-color); color: var(--primary-hover); }
        .btn-outline:hover { background: var(--primary-color); color: white; }
    </style>
</head>
<body>

    <div id="customModal" class="modal-overlay">
        <div class="modal-content">
            <div id="modalIconContainer" style="display: none;"></div>
            <h3 id="modalTitle" style="margin-top:0;">แจ้งเตือน</h3>
            <p id="modalText"></p>
            <input type="text" id="modalInput">
            <div class="modal-buttons">
                <button id="modalBtnConfirm" onclick="window.closeModal(true)">ตกลง</button>
                <button id="modalBtnCancel" class="modal-btn-cancel" onclick="window.closeModal(false)" style="display:none;">ยกเลิก</button>
            </div>
        </div>
    </div>

    <div id="statusModal" class="modal-overlay">
        <div class="modal-content">
            <h3 style="margin-top:0;">เปลี่ยนสถานะการจอง 🔄</h3>
            <input type="hidden" id="statusDocId">
            <div class="form-group">
                <label>เลือกสถานะใหม่:</label>
                <select id="newStatusSelect">
                    <option value="รออนุมัติ">รออนุมัติ</option>
                    <option value="ยืนยันแล้ว">ยืนยันแล้ว</option>
                    <option value="รอคืนของ">รอคืนของ</option>
                    <option value="คืนแล้ว">คืนแล้ว</option>
                    <option value="ยกเลิก">ยกเลิก</option>
                </select>
            </div>
            <div class="modal-buttons">
                <button onclick="window.saveStatusEdit()">บันทึก</button>
                <button class="modal-btn-cancel" onclick="document.getElementById('statusModal').style.display='none'">ยกเลิก</button>
            </div>
        </div>
    </div>

    <div id="equipmentModal" class="modal-overlay">
        <div class="modal-content">
            <h3 id="eqModalTitle" style="margin-top:0;">เพิ่มอุปกรณ์ใหม่ 🛠️</h3>
            <input type="hidden" id="eqDocId">
            <div class="form-group">
                <label>ชื่ออุปกรณ์</label>
                <input type="text" id="eqName" placeholder="เช่น ชุดสีน้ำ">
            </div>
            <div class="form-group">
                <label>จำนวนทั้งหมด (ชิ้น/ชุด)</label>
                <input type="number" id="eqQuantity" min="1" placeholder="เช่น 5">
            </div>
            <div class="modal-buttons">
                <button onclick="window.saveEquipment()">บันทึก</button>
                <button class="modal-btn-cancel" onclick="document.getElementById('equipmentModal').style.display='none'">ยกเลิก</button>
            </div>
        </div>
    </div>

    <div id="editUserModal" class="modal-overlay">
        <div class="modal-content" style="max-height: 90vh; overflow-y: auto;">
            <h3 style="margin-top:0;">แก้ไขข้อมูลสมาชิก ✏️</h3>
            <input type="hidden" id="editUserId">
            <div class="form-group">
                <label>รหัสนักศึกษา (Username)</label>
                <input type="text" id="editUserUsername" disabled style="background-color: #eee;">
            </div>
            
            <div class="name-group">
                <div class="form-group">
                    <label>ชื่อ</label>
                    <input type="text" id="editUserFirstName">
                </div>
                <div class="form-group">
                    <label>นามสกุล</label>
                    <input type="text" id="editUserLastName">
                </div>
            </div>

            <div class="form-group">
                <label>คณะ</label>
                <select id="editUserFaculty">
                    <option value="" disabled selected>เลือกคณะ...</option>
                    <optgroup label="วิทยาศาสตร์สุขภาพ">
                        <option value="คณะแพทยศาสตร์">คณะแพทยศาสตร์</option>
                        <option value="คณะทันตแพทยศาสตร์">คณะทันตแพทยศาสตร์</option>
                        <option value="คณะเภสัชศาสตร์">คณะเภสัชศาสตร์</option>
                        <option value="คณะพยาบาลศาสตร์">คณะพยาบาลศาสตร์</option>
                        <option value="คณะสหเวชศาสตร์">คณะสหเวชศาสตร์</option>
                        <option value="คณะสาธารณสุขศาสตร์">คณะสาธารณสุขศาสตร์</option>
                        <option value="คณะวิทยาศาสตร์การแพทย์">คณะวิทยาศาสตร์การแพทย์</option>
                    </optgroup>
                    <optgroup label="วิทยาศาสตร์และเทคโนโลยี">
                        <option value="คณะวิทยาศาสตร์">คณะวิทยาศาสตร์</option>
                        <option value="คณะวิศวกรรมศาสตร์">คณะวิศวกรรมศาสตร์</option>
                        <option value="คณะสถาปัตยกรรมศาสตร์ ศิลปะและการออกแบบ">คณะสถาปัตยกรรมศาสตร์ ศิลปะและการออกแบบ</option>
                        <option value="คณะเกษตรศาสตร์ฯ">คณะเกษตรศาสตร์ ทรัพยากรธรรมชาติและสิ่งแวดล้อม</option>
                        <option value="คณะโลจิสติกส์ฯ">คณะโลจิสติกส์และดิจิทัลซัพพลายเชน</option>
                    </optgroup>
                    <optgroup label="มนุษยศาสตร์และสังคมศาสตร์">
                        <option value="คณะมนุษยศาสตร์">คณะมนุษยศาสตร์</option>
                        <option value="คณะศึกษาศาสตร์">คณะศึกษาศาสตร์</option>
                        <option value="คณะนิติศาสตร์">คณะนิติศาสตร์</option>
                        <option value="คณะบริหารธุรกิจฯ (BEC)">คณะบริหารธุรกิจ เศรษฐศาสตร์และการสื่อสาร</option>
                        <option value="คณะสังคมศาสตร์">คณะสังคมศาสตร์</option>
                        <option value="วิทยาลัยนานาชาติ (NUIC)">วิทยาลัยนานาชาติ (NUIC)</option>
                    </optgroup>
                </select>
            </div>
            <div class="form-group">
                <label>สาขา</label>
                <input type="text" id="editUserMajor">
            </div>
            <div class="form-group">
                <label>ชั้นปีที่ศึกษา</label>
                <select id="editUserYear">
                    <option value="1">ปี 1</option>
                    <option value="2">ปี 2</option>
                    <option value="3">ปี 3</option>
                    <option value="4">ปี 4</option>
                    <option value="5">ปี 5</option>
                    <option value="6">ปี 6</option>
                </select>
            </div>
            <div class="form-group">
                <label>รหัสผ่าน</label>
                <input type="text" id="editUserPassword">
            </div>
            <div class="modal-buttons">
                <button onclick="window.saveUserEdit()">บันทึกข้อมูล</button>
                <button class="modal-btn-cancel" onclick="document.getElementById('editUserModal').style.display='none'">ยกเลิก</button>
            </div>
        </div>
    </div>

    <div id="loginPage" class="container active-page">
        <h1>Art Therapy Club</h1>
        <p style="text-align: center; color: #666; margin-bottom: 2rem;">ลงชื่อเข้าใช้ระบบจองอุปกรณ์</p>
        
        <div class="form-group">
            <label>รหัสนักศึกษา / Username</label>
            <input type="text" id="loginUsername" placeholder="กรอกรหัสนักศึกษา">
        </div>
        <div class="form-group">
            <label>รหัสผ่าน</label>
            <input type="password" id="loginPassword" placeholder="กรอกรหัสผ่าน">
        </div>

        <button onclick="window.loginUser()">เข้าสู่ระบบ</button>
        <button class="link-btn" onclick="window.showPage('registerPage')">ผู้ใช้งานใหม่? สมัครสมาชิกที่นี่</button>
        <button class="link-btn" onclick="window.loginAdmin()" style="margin-top: 2rem; color: #999;">สำหรับผู้ดูแลระบบ (Admin)</button>
    </div>

    <div id="registerPage" class="container">
        <h2>สมัครสมาชิกใหม่ 📝</h2>
        <div class="form-group">
            <label>รหัสนักศึกษา / Username (ใช้สำหรับเข้าระบบ)</label>
            <input type="text" id="regUsername" placeholder="กรอกรหัสนักศึกษา">
        </div>
        
        <div class="name-group">
            <div class="form-group">
                <label>ชื่อ</label>
                <input type="text" id="regFirstName" placeholder="เช่น สมหญิง">
            </div>
            <div class="form-group">
                <label>นามสกุล</label>
                <input type="text" id="regLastName" placeholder="เช่น รักศิลปะ">
            </div>
        </div>

        <div class="form-group">
            <label>คณะ (มหาวิทยาลัยนเรศวร)</label>
            <select id="regFaculty">
                <option value="" disabled selected>เลือกคณะ...</option>
                <optgroup label="วิทยาศาสตร์สุขภาพ">
                    <option value="คณะแพทยศาสตร์">คณะแพทยศาสตร์</option>
                    <option value="คณะทันตแพทยศาสตร์">คณะทันตแพทยศาสตร์</option>
                    <option value="คณะเภสัชศาสตร์">คณะเภสัชศาสตร์</option>
                    <option value="คณะพ
