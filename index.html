<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Art Therapy Club Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@400;700&display=swap" rel="stylesheet">
  <style>
    /* CSS Styles */
    body {
      font-family: 'Prompt', sans-serif;
      background-color: #fff8ef; /* สีพื้นหลังหลักจากimage_3 */
      /* ใช้ภาพพื้นหลังหลายชั้น: 1.เครื่องเขียนบน, 2.เครื่องเขียนล่าง, 3.ลวดลายไร้รอยต่อ */
      background-image:
        url('https://i.ibb.co/Xz9R2Hn/stationary-top.png'), /* ตัดขอบเครื่องเขียนบนจากimage_3 */
        url('https://i.ibb.co/L95B6F5/stationary-bottom.png'), /* ตัดขอบเครื่องเขียนล่างจากimage_3 */
        url('https://i.ibb.co/D8G3Y1G/image-2.png'); /* image_2.png ลวดลายไร้รอยต่อ */
      background-position: top center, bottom center, top left;
      background-repeat: no-repeat, no-repeat, repeat;
      background-size: auto 120px, auto 120px, 300px 300px; /* ปรับขนาดเครื่องเขียน */
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 120px 0; /* เว้นที่ให้เครื่องเขียนบนและล่าง */
    }

    .login-card {
      background-color: #f7e6e1; /* สีครีมพีชจากimage_3 */
      border: 3px solid #edccbf; /* ขอบเน้นสีพีชเข้ม */
      border-radius: 20px;
      padding: 50px 40px;
      box-shadow: 0 8px 16px rgba(0,0,0,0.1);
      width: 420px;
      text-align: center;
      position: relative; /* สำหรับจัดวางองค์ประกอบภายใน */
    }

    /* องค์ประกอบภายใน .login-card */
    .club-title {
      font-size: 36px;
      color: #5c674e; /* สีเขียวมะกอกเข้มเดิม */
      margin: 0 0 10px;
      font-weight: 700;
    }

    .subtitle {
      font-size: 18px;
      color: #8f6c58; /* สีเบจเข้ม */
      margin: 0 0 40px;
    }

    .form-group {
      text-align: left;
      margin-bottom: 25px;
    }

    .form-group label {
      display: block;
      color: #8f6c58; /* สีเบจเข้ม */
      margin-bottom: 8px;
      font-size: 16px;
    }

    .form-group input {
      width: 100%;
      padding: 15px 20px 15px 55px; /* เว้นที่ให้ไอคอนด้านซ้าย */
      font-size: 16px;
      border: 1px solid #edccbf;
      border-radius: 10px;
      background-color: white;
      color: #8f6c58;
      box-sizing: border-box; /* สำคัญสำหรับการคำนวณ padding */
      background-repeat: no-repeat;
      background-position: 15px center;
      background-size: 25px 25px;
    }

    /* ไอคอนฟิลด์อินพุต (Username, Password) */
    #username {
      background-image: url('https://i.ibb.co/3s6HkF7/brush-icon.png'); /* ไอคอนพู่กันจากimage_3 */
    }

    #password {
      background-image: url('https://i.ibb.co/P2HkXF7/pencil-icon.png'); /* ไอคอนดินสอจากimage_3 */
    }

    .form-group input::placeholder {
      color: #e0b4a4;
    }

    /* สไตล์ปุ่ม */
    .login-button {
      width: 100%;
      padding: 18px;
      background-color: #a3b18a; /* สีเขียวมะกอกเดิม */
      border: none;
      border-radius: 10px;
      color: #5c674e; /* สีเขียวเข้ม */
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
      transition: background-color 0.2s;
    }

    .login-button:hover {
      background-color: #90a078;
    }

    /* ลิงก์ด้านล่าง */
    .bottom-links {
      margin-top: 30px;
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .bottom-links a {
      color: #8f6c58; /* สีเบจเข้ม */
      text-decoration: none;
      font-size: 14px;
      transition: color 0.2s;
    }

    .bottom-links a:hover {
      color: #5c674e; /* สีเขียวมะกอกเข้มเมื่อโฮเวอร์ */
    }
  </style>
</head>
<body>
  <div class="login-card">
    <h1 class="club-title">Art Therapy Club</h1>
    <p class="subtitle">ลงชื่อเข้าใช้ระบบจองอุปกรณ์</p>
    <form class="login-form">
      <div class="form-group">
        <label for="username">รหัสนักศึกษา / Username</label>
        <input type="text" id="username" placeholder="กรอกรหัสนักศึกษา">
      </div>
      <div class="form-group">
        <label for="password">รหัสผ่าน</label>
        <input type="password" id="password" placeholder="กรอกรหัสผ่าน">
      </div>
      <button type="submit" class="login-button">เข้าสู่ระบบ</button>
    </form>
    <div class="bottom-links">
      <a href="#" class="new-user-link">ผู้ใช้งานใหม่? สมัครสมาชิกที่นี่</a>
      <a href="#" class="admin-link">สำหรับผู้ดูแลระบบ (Admin)</a>
    </div>
  </div>
</body>
</html>
