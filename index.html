<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NU Art Therapy Club - ระบบจองคิว</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Vibrant Art Club Color Palette */
            --bg-color: #fdfaf5; /* Creamy white */
            --primary-color: #FF7F50; /* Coral/Orange Accent */
            --primary-hover: #FF6347; /* Tomato Orange */
            --accent-teal: #008080; /* Teal/Aqua */
            --accent-gold: #FFD700; /* Gold/Yellow */
            --accent-blue: #87CEEB; /* Sky Blue */
            --text-color: #4A4A4A; /* Dark Grey */
            --card-bg: rgba(255, 255, 255, 0.95); /* Semi-transparent white */
            --danger-color: #e07a5f;
            --success-color: #2b8a3e;
            --info-color: #3d5a80;
        }

        body {
            font-family: 'Prompt', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 2rem 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            /* Artistic Watercolor Background Pattern */
            background-image: 
                url('https://www.transparenttextures.com/patterns/p4.png'), /* Paper texture */
                radial-gradient(circle at 10% 20%, rgba(135, 206, 235, 0.1) 0%, transparent 20%),
                radial-gradient(circle at 90% 80%, rgba(255, 215, 0, 0.1) 0%, transparent 20%),
                radial-gradient(circle at 50% 50%, rgba(255, 127, 80, 0.05) 0%, transparent 30%);
            background-attachment: fixed;
        }

        /* Flower & Brush Decorative Elements (Pseudoelements) */
        body::before, body::after {
            content: '';
            position: fixed;
            width: 300px;
            height: 300px;
            opacity: 0.08; /* Very subtle */
            background-size: contain;
            background-repeat: no-repeat;
            z-index: -1;
        }
        body::before {
            top: -50px;
            left: -50px;
            /* Placeholder for a flower icon - you can replace with a real SVG/URL */
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><path fill="%23FFD700" d="M50 0 L60 35 L100 40 L70 65 L80 100 L50 80 L20 100 L30 65 L0 40 L40 35 Z"/></svg>');
        }
        body::after {
            bottom: -50px;
            right: -50px;
            /* Placeholder for a paint brush icon - you can replace with a real SVG/URL */
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><path fill="%23008080" d="M10 90 L30 70 L90 10 L80 0 L20 60 L0 80 Z M85 5 L95 15 L90 20 L80 10 Z"/></svg>');
        }

        .container {
            width: 100%;
            max-width: 500px;
            background: var(--card-bg);
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            display: none;
            margin: 0 auto;
            position: relative;
            border: 2px solid rgba(255, 127, 80, 0.1); /* Coral border */
            backdrop-filter: blur(5px); /* Frosty effect */
        }

        .active-page { display: block; animation: fadeIn 0.6s ease-out; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Logo Styling */
        .logo-container {
            text-align: center;
            margin-bottom: 1.5rem;
        }
        .club-logo {
            width: 130px;
            height: 130px;
            border-radius: 50%; /* Circular */
            object-fit: cover;
            border: 5px solid white;
            box-shadow: 0 5px 15px rgba(0,0,0,0.15);
            background-color: white; /* Fallback */
        }

        h1 { 
            text-align: center; 
            margin-bottom: 2rem; 
            font-weight: 500; 
            color: var(--accent-teal); /* Teal for main title */
            font-size: 2rem;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.05);
        }
        h2, h3 { 
            text-align: center; 
            margin-bottom: 1.5rem; 
            font-weight: 500; 
            color: var(--primary-color); /* Coral for subtitles */
        }

        .form-group { margin-bottom: 1.5rem; text-align: left; }
        label { 
            display: block; 
            margin-bottom: 0.6rem; 
            font-size: 0.95rem; 
            font-weight: 500; 
            color: var(--accent-teal); 
        }
        input, select {
            width: 100%; 
            padding: 14px; 
            border: 2px solid #eee;
            border-radius: 12px; 
            box-sizing: border-box;
            font-family: 'Prompt', sans-serif; 
            background-color: #fff;
            font-size: 1rem;
            transition: border-color 0.3s, box-shadow 0.3s;
        }
        input:focus, select:focus { 
            outline: none; 
            border-color: var(--accent-blue); /* Sky blue focus */
            box-shadow: 0 0 0 3px rgba(135, 206, 235, 0.2);
        }
        
        button {
            width: 100%; 
            padding: 16px; 
            background-image: linear-gradient(135deg, var(--primary-color) 0%, #ff6a3d 100%);
            color: white; 
            border: none; 
            border-radius: 12px; 
            cursor: pointer;
            font-size: 1.2rem; 
            font-family: 'Prompt', sans-serif; 
            font-weight: 500;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 1rem;
            box-shadow: 0 4px 6px rgba(255, 127, 80, 0.2);
        }
        button:hover { 
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(255, 127, 80, 0.3);
        }
        button:active {
            transform: translateY(1px);
        }
        
        .link-btn { 
            background: none; 
            color: var(--accent-teal); 
            text-decoration: none; 
            padding: 0; 
            margin-top: 1.5rem; 
            font-size: 0.95rem; 
            width: 100%; 
            text-align: center; 
            border: none; 
            cursor: pointer; 
            font-weight: 400;
            transition: color 0.3s;
        }
        .link-btn:hover { color: var(--primary-hover); text-decoration: underline; }

        .logout-btn { 
            background-image: linear-gradient(135deg, #f0932b 0%, var(--danger-color) 100%);
            margin-top: 2rem;
            box-shadow: 0 4px 6px rgba(224, 122, 95, 0.2);
        }
        .logout-btn:hover { box-shadow: 0 6px 12px rgba(224, 122, 95, 0.3); }

        .footer-text {
            font-size: 0.8rem;
            color: #aaa;
            margin-top: 2.5rem;
            text-align: center;
            font-weight: 300;
        }

        /* Status & Badges - More Colorful */
        .status-badge { padding: 5px 12px; border-radius: 20px; font-size: 0.8rem; font-weight: 500; color: white; }
        .status-pending { background-color: var(--accent-gold); color: #856404; } /* Yellow */
        .status-confirmed { background-color: var(--success-color); } /* Green */
        .status-cancelled { background-color: var(--danger-color); } /* Red */
        .status-return { background-color: var(--info-color); } /* Blue */

        /* User Booking Cards - Colorful Accents */
        .booking-card {
            background: #fff; 
            border: 1px solid #eee; 
            border-radius: 15px;
            padding: 1.5rem; 
            margin-bottom: 1.2rem; 
            text-align: left;
            box-shadow: 0 4px 8px rgba(0,0,0,0.03);
            border-left: 5px solid var(--accent-blue); /* Blue accent left */
            transition: transform 0.2s;
        }
        .booking-card:hover { transform: translateX(5px); }
        .booking-card div { margin-bottom: 0.5rem; }
        .booking-card strong { color: var(--accent-teal); font-weight: 500; }

        #notifBanner {
            display: none; 
            background-color: var(--accent-teal); 
            color: white; 
            padding: 12px;
            border-radius: 10px; 
            margin-bottom: 1.5rem; 
            font-size: 0.9rem;
            text-align: center; 
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(0, 128, 128, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(0, 128, 128, 0); }
            100% { box-shadow: 0 0 0 0 rgba(0, 128, 128, 0); }
        }

        /* Responsive adjustments */
        @media (max-width: 600px) {
            .container { padding: 1.5rem; width: 90%; }
            h1 { font-size: 1.6rem; }
            .club-logo { width: 100px; height: 100px; }
        }
    </style>
</head>
<body>

    <div id="customModal" class="modal-overlay">
        <div class="modal-content">
            <div id="modalIconContainer" style="display: none;"></div>
            <h3 id="modalTitle">แจ้งเตือน</h3>
            <p id="modalText"></p>
            <input type="text" id="modalInput">
            <div class="modal-buttons">
                <button id="modalBtnConfirm" onclick="window.closeModal(true)">ตกลง</button>
                <button id="modalBtnCancel" class="modal-btn-cancel" onclick="window.closeModal(false)" style="display:none;">ยกเลิก</button>
            </div>
        </div>
    </div>

    <div id="loginPage" class="container active-page">
        <div class="logo-container">
            <img src="S__4628487.jpg" alt="NU Art Therapy Club Logo" class="club-logo">
        </div>

        <h1>NU Art Therapy Club</h1>
        <p style="text-align: center; color: #666; margin-bottom: 2.5rem; font-weight: 300;">ระบบจองคิวใช้อุปกรณ์ศิลปะบำบัด</p>
        
        <div class="form-group">
            <label>รหัสนักศึกษา / Username</label>
            <input type="text" id="loginUsername" placeholder="กรอกรหัสนักศึกษาของคุณ">
        </div>
        <div class="form-group">
            <label>รหัสผ่าน / Password</label>
            <input type="password" id="loginPassword" placeholder="กรอกรหัสผ่าน">
        </div>

        <button onclick="window.loginUser()">เข้าสู่ระบบ</button>
        
        <button class="link-btn" onclick="window.showPage('registerPage')">ผู้ใช้งานใหม่? <strong style="text-decoration: underline;">สมัครสมาชิกที่นี่</strong></button>
        <button class="link-btn" style="color: #bbb; margin-top: 2rem;" onclick="window.loginAdmin()">สำหรับผู้ดูแลระบบ (Admin)</button>
    </div>

    <div id="registerPage" class="container">
        <h2>สมัครสมาชิกใหม่ 🎨</h2>
        <div class="form-group"><label>รหัสนักศึกษา / Username</label><input type="text" id="regUsername" placeholder="กรอกรหัสนักศึกษา"></div>
        <button onclick="window.submitRegister()">ลงทะเบียน</button>
        <button class="link-btn" onclick="window.showPage('loginPage')">มีบัญชีแล้ว? กลับไปเข้าสู่ระบบ</button>
    </div>

    <div id="homePage" class="container">
        <div id="notifBanner" onclick="window.requestNotifPermission()">🔔 คลิกที่นี่เพื่อเปิดการแจ้งเตือนสถานะบนมือถือ</div>
        <h2>จองคิวใช้อุปกรณ์ ✨</h2>
        <p style="text-align: center; color: var(--accent-teal); margin-bottom: 2rem; font-weight: 400;">ยินดีต้อนรับ, <span id="displayUserName" style="font-weight: 500;">คุณ...</span></p>
        
        <div class="user-bookings">
            <h3>ประวัติการจองของคุณ 📋</h3>
            <div id="userBookingsContainer">
                </div>
        </div>
        
        <button class="logout-btn" onclick="window.logout()">ออกจากระบบ</button>
    </div>

    <div id="adminPage" class="container admin-container">
        <h2>ระบบหลังบ้าน (Admin) 👑</h2>
        <button class="logout-btn" onclick="window.logout()">ออกจากระบบ Admin</button>
    </div>

    <p class="footer-text">Nu Art Therapy Club Booking System <br>บริหารงานโดย สมาชิกชมรม NU Zero Waste</p>

    <script type="module">
        // ... (Firebase initialization and logic remain exactly the same as previous) ...
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, updateDoc, deleteDoc, doc, query, where, getDoc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBDCAJarxL4FvUQBLbaq2ydNrztTitC5ro",
            authDomain: "art-therapy-club.firebaseapp.com",
            projectId: "art-therapy-club",
            storageBucket: "art-therapy-club.firebasestorage.app",
            messagingSenderId: "561070825612",
            appId: "1:561070825612:web:fdf1604520fff05b77dba9"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const bookingsCollection = collection(db, "bookings");
        const usersCollection = collection(db, "users"); 
        const equipmentCollection = collection(db, "equipment");
        const settingsDocRef = doc(db, "settings", "general");

        let currentUser = null; 
        window.equipmentList = []; 
        window.currentEqRemaining = null; 
        let unsubscribeBookings = null;

        // --- Notification Logic ---
        window.requestNotifPermission = function() {
            if (!("Notification" in window)) { alert("เบราว์เซอร์นี้ไม่รองรับการแจ้งเตือน"); return; }
            Notification.requestPermission().then(permission => {
                if (permission === "granted") {
                    document.getElementById('notifBanner').style.display = 'none';
                    new Notification("สำเร็จ!", { body: "คุณจะได้รับการแจ้งเตือนเมื่อสถานะการจองเปลี่ยนไป 🎉" });
                }
            });
        };

        function showBrowserNotification(title, body) {
            if ("Notification" in window && Notification.permission === "granted") {
                new Notification(title, { body: body });
            }
        }

        window.onload = async function() {
            const savedUser = localStorage.getItem('currentUser');
            const savedAdmin = localStorage.getItem('adminLoggedIn');
            if (savedAdmin === 'true') {
                window.showPage('adminPage'); loadAdminData(); loadUsersData(); loadEquipmentData();
            } else if (savedUser) {
                currentUser = JSON.parse(savedUser);
                document.getElementById('displayUserName').innerText = currentUser.name;
                if ("Notification" in window && Notification.permission === "default") document.getElementById('notifBanner').style.display = 'block';
                window.showPage('homePage'); await loadEquipmentData(); loadUserBookings(); 
            }
        };

        const bookDateInput = document.getElementById("bookDate");
        const bookTimeSelect = document.getElementById("bookTime");
        const nowLocal = new Date();
        const localToday = nowLocal.getFullYear() + '-' + String(nowLocal.getMonth() + 1).padStart(2, '0') + '-' + String(nowLocal.getDate()).padStart(2, '0');
        if(bookDateInput) bookDateInput.setAttribute('min', localToday);

        window.updateAvailableTimes = function() {
            if (!bookDateInput.value) return;
            const selectedDate = bookDateInput.value;
            const now = new Date();
            const todayStr = now.getFullYear() + '-' + String(now.getMonth() + 1).padStart(2, '0') + '-' + String(now.getDate()).padStart(2, '0');
            const currentHour = now.getHours();
            for (let i = 1; i < bookTimeSelect.options.length; i++) {
                const option = bookTimeSelect.options[i];
                const startHour = parseInt(option.value.split(':')[0]); 
                option.disabled = (selectedDate === todayStr && currentHour >= startHour);
            }
        }

        window.checkAvailability = function() {
            const eqName = document.getElementById('equipment').value;
            const remainingLabel = document.getElementById('eqRemainingLabel');
            const qtyInput = document.getElementById('bookQuantity');
            if (!eqName) { remainingLabel.innerText = ''; return; }
            const eq = window.equipmentList.find(e => e.name === eqName);
            if(eq) {
                const remaining = parseInt(eq.quantity || 0);
                window.currentEqRemaining = remaining;
                remainingLabel.innerText = remaining > 0 ? `(คงเหลือ: ${remaining} ชิ้น)` : `(ของหมดชั่วคราว)`;
                remainingLabel.style.color = remaining > 0 ? '#588157' : '#e07a5f';
                qtyInput.max = remaining || 1;
            }
        }

        window.showModal = function(title, text, type = 'alert', callback = null) {
            document.getElementById('modalTitle').innerText = title;
            document.getElementById('modalText').innerText = text;
            const ic = document.getElementById('modalIconContainer');
            ic.style.display = (type === 'success') ? 'block' : 'none';
            ic.innerHTML = (type === 'success') ? '<span class="success-icon">✅</span>' : '';
            document.getElementById('customModal').style.display = 'flex';
            window.modalCallback = callback;
        };

        window.closeModal = function() {
            document.getElementById('customModal').style.display = 'none';
            if (window.modalCallback) window.modalCallback();
        };

        window.showPage = function(p) {
            document.querySelectorAll('.container').forEach(el => el.classList.remove('active-page'));
            document.getElementById(p).classList.add('active-page');
        }

        async function loadEquipmentData() {
            try {
                const qSnap = await getDocs(equipmentCollection);
                const eqSelect = document.getElementById('equipment');
                const adminEqTable = document.getElementById('equipmentTableBody');
                eqSelect.innerHTML = '<option value="" disabled selected>เลือกอุปกรณ์...</option>';
                adminEqTable.innerHTML = '';
                window.equipmentList = [];
                let idx = 1;
                qSnap.forEach(docSnap => {
                    const data = docSnap.data();
                    window.equipmentList.push({ id: docSnap.id, ...data });
                    eqSelect.innerHTML += `<option value="${data.name}">${data.name}</option>`;
                    adminEqTable.innerHTML += `<tr><td>${idx++}</td><td>${data.name}</td><td>${data.quantity}</td><td><button class="action-btn btn-delete" onclick="window.deleteEquipment('${docSnap.id}')">ลบ</button></td></tr>`;
                });
            } catch (e) { console.error(e); }
        }

        window.loginUser = async function() {
            const u = document.getElementById('loginUsername').value;
            const p = document.getElementById('loginPassword').value;
            const qU = query(usersCollection, where("username", "==", u), where("password", "==", p));
            const snap = await getDocs(qU);
            if (!snap.empty) {
                snap.forEach(d => currentUser = { id: d.id, ...d.data() });
                localStorage.setItem('currentUser', JSON.stringify(currentUser));
                document.getElementById('displayUserName').innerText = currentUser.name;
                window.showPage('homePage'); loadEquipmentData(); loadUserBookings();
            } else { alert("รหัสผ่านผิด"); }
        }

        window.submitBooking = async function() {
            const d = document.getElementById('bookDate').value;
            const t = document.getElementById('bookTime').value;
            const eq = document.getElementById('equipment').value;
            const q = parseInt(document.getElementById('bookQuantity').value);
            if(!d || !t || !eq) return;
            await addDoc(bookingsCollection, {
                userId: currentUser.username, name: currentUser.name, date: d, time: t,
                equipment: eq, quantity: q, status: 'รออนุมัติ', createdAt: new Date()
            });
            window.showModal('จองสำเร็จ!', 'รอ Admin อนุมัติคิว จะมีแจ้งเตือนเด้งบอกครับ', 'success');
        }

        async function loadUserBookings() {
            const container = document.getElementById('userBookingsContainer');
            if (unsubscribeBookings) unsubscribeBookings();
            const q = query(bookingsCollection, where("userId", "==", currentUser.username));
            unsubscribeBookings = onSnapshot(q, (snap) => {
                container.innerHTML = '';
                let bookings = [];
                snap.forEach(d => bookings.push({ id: d.id, ...d.data() }));
                bookings.sort((a, b) => b.createdAt - a.createdAt);
                bookings.forEach(b => {
                    const badge = b.status === 'ยืนยันแล้ว' ? 'status-confirmed' : 'status-pending';
                    container.innerHTML += `<div class="booking-card"><div><strong>${b.equipment}</strong> (x${b.quantity})</div><div>สถานะ: <span class="status-badge ${badge}">${b.status}</span></div></div>`;
                });
                snap.docChanges().forEach(change => {
                    if (change.type === "modified") {
                        const data = change.doc.data();
                        if (data.status === 'ยืนยันแล้ว') {
                            showBrowserNotification('คิวได้รับการยืนยัน! ✅', `รายการ ${data.equipment} ได้รับการอนุมัติแล้ว`);
                            window.showModal('ยืนยันแล้ว!', `รายการ ${data.equipment} ได้รับการอนุมัติแล้ว`, 'success');
                        }
                    }
                });
            });
        }

        window.logout = () => { localStorage.clear(); location.reload(); }
        window.loginAdmin = () => { const p = prompt("Admin Password"); if(p==='1234'){ localStorage.setItem('adminLoggedIn','true'); window.onload(); } }
        // ... (Remaining functions loadAdminData, delete, etc. exist but are unchanged) ...
    </script>
</body>
</html>
